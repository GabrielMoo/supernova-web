<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilosPrueba.css">
    <title>Document</title>
</head>

<body>
    <section class="latest-products">
        <div class="container">
            <div class="header">
                <h2>Latest Products</h2>
                <button class="btn-ghost">
                    See All
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </button>
            </div>

            <div class="product-grid">
                <article class="product-card" data-id="1">
                    <div class="image-box">
                        <img src="https://v3.material-tailwind.com/coat-1.png" alt="Premium Suit">
                    </div>
                    <div class="product-details">
                        <p class="category">Permanent Collection</p>
                        <h3 class="name">Premium Suit</h3>
                        <div class="color-selector">
                            <button class="color-dot bg-slate-950 active"></button>
                            <button class="color-dot bg-white border"></button>
                            <button class="color-dot bg-slate-200 border"></button>
                        </div>
                        <div class="price-box">
                            <span class="current-price">$1,100</span>
                        </div>
                    </div>
                </article>

                <article class="product-card" data-id="2">
                    <div class="image-box">
                        <img src="https://v3.material-tailwind.com/coat-2.png" alt="Wool Suit">
                    </div>
                    <div class="product-details">
                        <p class="category">Permanent Collection</p>
                        <h3 class="name">Wool Suit</h3>
                        <div class="color-selector">
                            <button class="color-dot bg-slate-950 active"></button>
                            <button class="color-dot bg-white border"></button>
                            <button class="color-dot bg-slate-200 border"></button>
                        </div>
                        <div class="price-box">
                            <span class="original-price">$2,300</span>
                            <span class="current-price">$1,300</span>
                        </div>
                    </div>
                </article>

                <article class="product-card" data-id="3">
                    <div class="image-box">
                        <img src="https://v3.material-tailwind.com/coat-3.png" alt="Cotton Suit">
                    </div>
                    <div class="product-details">
                        <p class="category">Permanent Collection</p>
                        <h3 class="name">Cotton Suit</h3>
                        <div class="color-selector">
                            <button class="color-dot bg-slate-950 active"></button>
                            <button class="color-dot bg-white border"></button>
                            <button class="color-dot bg-slate-200 border"></button>
                        </div>
                        <div class="price-box">
                            <span class="current-price">$790</span>
                        </div>
                    </div>
                </article>

                <article class="product-card" data-id="4">
                    <div class="image-box">
                        <img src="https://v3.material-tailwind.com/coat-4.png" alt="Linen Suit">
                    </div>
                    <div class="product-details">
                        <div style="margin-bottom: 0.5rem;"><span class="badge badge-sale">Sale</span></div>
                        <h3 class="name">Linen Suit</h3>
                        <div class="color-selector">
                            <button class="color-dot bg-slate-950 active"></button>
                            <button class="color-dot bg-white border"></button>
                            <button class="color-dot bg-slate-200 border"></button>
                        </div>
                        <div class="price-box">
                            <span class="original-price">$2,500</span>
                            <span class="current-price">$1,000</span>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>

    <script src="js/prueba.js"></script>
</body>

</html>
