<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Supernova Prints</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/estiloPagos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="js/navbar.js"></script>
</head>

<body>
    <header>
        <main-navbar></main-navbar>
    </header>

    <main class="contenedor-checkout">
        <div class="columna-izquierda">
            <section class="seccion-checkout">
                <div class="encabezado-seccion">
                    <h3>1. Dirección de envío</h3>
                </div>
                <div id="contenedor-direcciones-pago" class="lista-direcciones-pago">
                </div>
            </section>

            <section class="seccion-checkout">
                <div class="encabezado-seccion">
                    <h3>2. Método de pago</h3>
                </div>
                <div class="formulario-tarjeta">
                    <div class="input-grupo">
                        <label>Número de tarjeta</label>
                        <input type="text" id="input-tarjeta" placeholder="0000 0000 0000 0000" maxlength="19">
                    </div>
                    <div class="fila-inputs">
                        <div class="input-grupo">
                            <label>Fecha de expiración</label>
                            <input type="text" id="input-fecha" placeholder="MM/AA" maxlength="5">
                        </div>
                        <div class="input-grupo">
                            <label>CVV</label>
                            <input type="password" id="input-cvv" placeholder="123" maxlength="3">
                        </div>
                    </div>
                    <div class="input-grupo">
                        <label>Nombre en la tarjeta</label>
                        <input type="text" id="input-nombre" placeholder="Como aparece en la tarjeta">
                    </div>
                </div>
            </section>

            <button id="btn-finalizar-pedido" class="btn-principal btn-pagar">Pagar ahora</button>
        </div>

        <aside class="columna-derecha">
            <div class="resumen-pedido">
                <h3>Resumen del pedido</h3>
                <div id="lista-productos-resumen" class="productos-resumen">
                </div>

                <div class="desglose-costos">
                    <div class="linea-costo">
                        <span>Subtotal</span>
                        <span id="resumen-subtotal">$0.00</span>
                    </div>
                    <div class="linea-costo">
                        <span>Envío</span>
                        <span>$99.00</span>
                    </div>
                    <hr>
                    <div class="linea-costo total">
                        <span>Total</span>
                        <span id="resumen-total">$0.00</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <div id="modal-notificacion" class="modal-fondo" style="display: none;">
        <div class="modal-contenido">
            <div class="cabecera-modal-carrito">
                <h3 id="modal-titulo">ATENCIÓN</h3>
            </div>
            <div class="body-modal-carrito">
                <p id="modal-mensaje">Mensaje aquí</p>
            </div>
            <div class="footer-modal-carrito">
                <button id="btn-cerrar-notificacion" class="btn-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="js/scriptPagos.js"></script>
</body>

</html>
