<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="js/sidebar.js"></script>
    <title>Productos</title>
</head>

<body>

    <main-sidebar></main-sidebar>

    <div class="main-productos">

        <div class="top-productos">
            <div class="contenedor-perfil">
                <p>SP</p>
            </div>
        </div>

        <div id="vista-productos">
            <div class="header-tabla">
                <h1>Playeras</h1>
                <button class="btn-agregar" id="btn-mostrar-formulario">
                    <i class="bi bi-plus-circle"></i> Agregar una playera
                </button>
            </div>

            <div class="contenedor-tabla">
                <div class="body-tabla">
                    <table>
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="contenido-tabla">
                        </tbody>
                    </table>

                    <div class="paginacion">
                        <button class="btn-page btn-nav" id="btn-prev">
                            <i class="bi bi-chevron-left"></i> Previous
                        </button>
                        <div class="numeros-pagina" id="page-numbers">
                        </div>
                        <button class="btn-page btn-nav" id="btn-next">
                            Next <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="vista-agregar-producto" style="display: none;">

            <div class="header-tabla">
                <h1>Agrega una playera aquí</h1>
            </div>

            <div class="contenedor-formulario">
                <form id="formulario-producto">
                    <div class="grid-formulario">

                        <div class="col-formulario">
                            <div class="grupo-formulario">
                                <label>Ingresa el nombre de la playera</label>
                                <input type="text" id="nombre" placeholder="Nombre del producto" required>
                            </div>
                            <div class="grupo-formulario">
                                <label>Ingresa la descripción de la playera</label>
                                <textarea id="descripcion" placeholder="Descripción del producto" rows="7"></textarea>
                            </div>
                            <div class="grupo-formulario">
                                <label>Ingresa el precio de la playera</label>
                                <input type="number" id="precio" step="0.01" min="0" placeholder="0.00">
                            </div>
                            <div class="grupo-formulario">
                                <label>Elige la categoría</label>
                                <select id="categoria">
                                    <option value="">Categoría de la playera</option>
                                    <option value="generico">Generico</option>
                                    <option value="comics">Comics</option>
                                    <option value="videojuegos">Videojuegos</option>
                                    <option value="anime">Anime</option>
                                    <option value="peliculas">Peliculas</option>
                                    <option value="cantantes">Cantantes</option>
                                    <option value="wrestling">Wrestling</option>
                                    <option value="personalizado">Personalizado</option>
                                </select>
                            </div>
                            <div class="grupo-formulario">
                                <label>Elige el color</label>
                                <select id="color">
                                    <option value="">Color</option>
                                    <option value="Blanco">Blanco</option>
                                    <option value="Negro">Negro</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-formulario">
                            <div class="grupo-formulario">
                                <div class="header-upload">
                                    <label>Sube imágenes del producto</label>
                                </div>
                                <div class="caja-upload">
                                    <label for="imagen-producto" class="custom-upload-btn">

                                        <div id="upload-content" class="upload-content">
                                            <i class="bi bi-upload"></i>
                                        </div>
                                        <img id="image-preview" src="" alt="Vista previa" style="display: none;">

                                    </label>

                                    <input type="file" id="imagen-producto" accept="image/*">
                                </div>
                            </div>

                            <div class="gestion-stock">
                                <label class="titulo-stock">Gestión de Stock por Corte y Talla</label>

                                <div class="grid-cortes">
                                    <div class="corte-columna">
                                        <div class="header-corte">
                                            <input type="checkbox" id="corte-regular" class="check-corte"
                                                data-target="tallas-regular">
                                            <label for="corte-regular">Corte Regular</label>
                                        </div>
                                        <div class="lista-tallas" id="tallas-regular" style="display: none;">
                                            <div class="item-talla">
                                                <input type="checkbox" id="reg-s" class="check-talla" value="S"
                                                    data-corte="Regular">
                                                <label for="reg-s">Talla S</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                            <div class="item-talla">
                                                <input type="checkbox" id="reg-m" class="check-talla" value="M"
                                                    data-corte="Regular">
                                                <label for="reg-m">Talla M</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                            <div class="item-talla">
                                                <input type="checkbox" id="reg-l" class="check-talla" value="L"
                                                    data-corte="Regular">
                                                <label for="reg-l">Talla L</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                            <div class="item-talla">
                                                <input type="checkbox" id="reg-xl" class="check-talla" value="XL"
                                                    data-corte="Regular">
                                                <label for="reg-xl">Talla XL</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="corte-columna">
                                        <div class="header-corte">
                                            <input type="checkbox" id="corte-oversize" class="check-corte"
                                                data-target="tallas-oversize">
                                            <label for="corte-oversize">Corte Oversize</label>
                                        </div>
                                        <div class="lista-tallas" id="tallas-oversize" style="display: none;">
                                            <div class="item-talla">
                                                <input type="checkbox" id="over-s" class="check-talla" value="S"
                                                    data-corte="Oversize">
                                                <label for="over-s">Talla S</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                            <div class="item-talla">
                                                <input type="checkbox" id="over-m" class="check-talla" value="M"
                                                    data-corte="Oversize">
                                                <label for="over-m">Talla M</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                            <div class="item-talla">
                                                <input type="checkbox" id="over-l" class="check-talla" value="L"
                                                    data-corte="Oversize">
                                                <label for="over-l">Talla L</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                            <div class="item-talla">
                                                <input type="checkbox" id="over-xl" class="check-talla" value="XL"
                                                    data-corte="Oversize">
                                                <label for="over-xl">Talla XL</label>
                                                <input type="number" class="input-cantidad" min="1" placeholder="Cant."
                                                    style="display: none;">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="acciones-formulario">
                        <button type="button" class="btn-publicar" id="btnPublicar">Publicar Producto</button>
                        <button type="button" class="btn-cancelar" id="btn-cancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <div id="modal-exito" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="cabecera-playera-guardada">
                <h3>¡PLAYERA PUBLICADA!</h3>
            </div>
            <div class="body-playera-guardada">
                <p>La playera y su stock se han guardado con éxito.</p>
            </div>
            <button id="btn-modal-ok" class="btn-ok" style="border: 1px solid #030303;">Ok</button>

        </div>
    </div>

    <!-- Modal de confirmación para eliminar playera -->
    <div id="modal-eliminar-playera" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="cabecera-playera-guardada">
                <h3>¡CONFIRMAR ELIMINACIÓN!</h3>
            </div>
            <div class="body-playera-guardada">
                <p>¿Estás seguro de que deseas eliminar esta playera?<br>Esta acción también eliminará su stock y no se
                    podrá deshacer.</p>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 15px; padding: 20px;">
                <button id="btn-cancelar-eliminar" class="btn-cancelar"
                    style="background-color: #e5e5e5; color: #030303;">Cancelar</button>
                <button id="btn-confirmar-eliminar" class="btn-publicar">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="js/productos.js"></script>

</body>

</html>
