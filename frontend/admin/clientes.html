<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="js/sidebar.js"></script>
    <title>clientes</title>
</head>

<body>
    <main-sidebar></main-sidebar>

    <div class="main-productos"> 

        <div class="top-productos">
            <div class="input-buscar-productos">
                <input type="text" placeholder="Buscar cliente..." id="inputBuscar">
                <i class="bi bi-search"></i>
            </div>
            <div class="contenedor-perfil">
                <p>SP</p>
            </div>
        </div>

        <div id="vista-clientes">
            <div class="header-tabla">
                <h1>Clientes Registrados</h1>
                </div>

            <div class="contenedor-tabla">
                <div class="body-tabla">
                    <table>
                        <thead>
                            <tr style="background-color: #030303; color: white;">
                                <th>No.</th>
                                <th>Nombre del Cliente</th>
                                <th>Correo</th>
                                <th>Fecha de Registro</th>
                                <th>Pedidos Hechos</th>
                                <th>Total Gastado</th>
                            </tr>
                        </thead>
                        <tbody id="contenido-tabla">
                            </tbody>
                    </table>

                    <div class="paginacion">
                        <button class="btn-page btn-nav" id="btn-prev">
                            <i class="bi bi-chevron-left"></i> Previous
                        </button>
                        <div class="numeros-pagina" id="page-numbers">
                            </div>
                        <button class="btn-page btn-nav" id="btn-next">
                            Next <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/clientes.js"></script>
</body>

</html>
